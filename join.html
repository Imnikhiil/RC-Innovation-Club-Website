  <script>
    (function () {
      var tk = 'rc_theme_preference';
      var ck = 'rc_color_preference';
      var colors = ['ocean', 'sunset', 'emerald', 'royal', 'coral'];
      var t = null, c = null;
      try { t = localStorage.getItem(tk); c = localStorage.getItem(ck); } catch (e) {}
      if (t !== 'dark' && t !== 'light') {
        t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      }
      if (colors.indexOf(c) === -1) c = 'ocean';
      document.documentElement.setAttribute('data-theme', t);
      document.documentElement.setAttribute('data-color', c);
    })();
  </script>

<main class="site-main page-main">
<!-- JOIN -->
  <section id="join" class="section-block">
    <div class="site-container max-w-3xl mx-auto glass join-card ui-panel card-hover" data-reveal>
      <span class="section-eyebrow" id="cms-join-eyebrow">Get Involved</span>
      <h2 class="text-2xl sm:text-3xl md:text-4xl font-extrabold mb-4 mt-2" id="cms-join-title">Join RC Innovation Club</h2>
      <p class="mb-6 sm:mb-8 max-w-xl mx-auto leading-relaxed text-sm sm:text-base px-1" id="cms-join-desc"></p>

      <div id="membership-cta" class="membership-cta" style="display:none">
        <button type="button" id="membership-open-btn" class="btn-primary px-8 py-3.5 rounded-xl font-bold" onclick="window.openMembershipForm && window.openMembershipForm(event)">
          <i class="fas fa-user-plus" aria-hidden="true"></i> Join RC Innovation Club
        </button>
      </div>

      <div id="membership-closed-msg" class="membership-notice" style="display:none" role="status">
        <div class="membership-notice__icon" id="membership-notice-icon" aria-hidden="true">
          <i class="fas fa-lock"></i>
        </div>
        <div class="membership-notice__body">
          <strong id="membership-closed-title">Registration Closed</strong>
          <p id="membership-closed-text">Membership registration is not open right now. Please try again next semester.</p>
        </div>
      </div>

      <div class="join-actions">
        <a href="#" id="cms-join-link-ig" target="_blank" rel="noopener" class="btn-primary px-8 py-3.5 rounded-xl font-bold">
          <span id="cms-join-btn-ig">Follow on Instagram</span>
        </a>
        <a href="#" id="cms-join-link-wa" target="_blank" rel="noopener" class="btn-secondary px-8 py-3.5 rounded-xl font-bold text-white">
          <span id="cms-join-btn-wa">Join WhatsApp Channel</span>
        </a>
      </div>
    </div>

    <!-- Inline membership registration form -->
    <div id="membership-form-panel" class="membership-panel site-container max-w-3xl mx-auto">
      <div class="membership-panel__inner glass">
        <div class="membership-panel__header">
          <h3 class="membership-panel__title">Membership Registration</h3>
          <button type="button" class="membership-panel__close" id="membership-close-btn" aria-label="Close registration form" onclick="window.closeMembershipForm && window.closeMembershipForm(event)">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <p class="membership-panel__subtitle">Fill out the form below to apply for RC Innovation Club membership.</p>

        <form id="membership-form" class="membership-form" novalidate>
          <div class="membership-form__grid">
            <div class="membership-field">
              <label for="mem-name">Full Name <span class="required">*</span></label>
              <input type="text" id="mem-name" name="name" required autocomplete="name" placeholder="Your full name" />
            </div>
            <div class="membership-field">
              <label for="mem-enrollment">Enrollment Number <span class="required">*</span></label>
              <input type="text" id="mem-enrollment" name="enrollmentNumber" required placeholder="e.g. 24CS001" />
            </div>
            <div class="membership-field">
              <label for="mem-course">Course <span class="required">*</span></label>
              <input type="text" id="mem-course" name="course" required placeholder="e.g. B.Tech CSE" />
            </div>
            <div class="membership-field">
              <label for="mem-semester">Semester <span class="required">*</span></label>
              <input type="text" id="mem-semester" name="semester" required placeholder="e.g. 4th Semester" />
            </div>
            <div class="membership-field">
              <label for="mem-email">Email <span class="required">*</span></label>
              <input type="email" id="mem-email" name="email" required autocomplete="email" placeholder="you@example.com" />
            </div>
            <div class="membership-field">
              <label for="mem-phone">Phone Number <span class="required">*</span></label>
              <input type="tel" id="mem-phone" name="phone" required autocomplete="tel" placeholder="10-digit mobile number" />
            </div>
          </div>
          <div class="membership-field">
            <label for="mem-skills">Skills</label>
            <input type="text" id="mem-skills" name="skills" placeholder="e.g. Python, Web Development, Robotics" />
          </div>
          <div class="membership-field">
            <label for="mem-interests">Interests</label>
            <input type="text" id="mem-interests" name="interests" placeholder="e.g. AI, Hackathons, Design" />
          </div>
          <div class="membership-field">
            <label for="mem-reason">Reason for Joining <span class="required">*</span></label>
            <textarea id="mem-reason" name="reason" rows="3" required placeholder="Why do you want to join RC Innovation Club?"></textarea>
          </div>
          <div class="membership-form__error" id="membership-form-error" role="alert"></div>
          <div class="membership-form__success" id="membership-form-success" role="status"></div>
          <button type="submit" class="btn-primary membership-form__submit" id="membership-submit-btn">
            <i class="fas fa-paper-plane" aria-hidden="true"></i> Submit Application
          </button>
        </form>
      </div>
    </div>
  </section>
<!-- NEWSLETTER -->
  <section id="newsletter" class="newsletter-section section-block" hidden>
    <div class="site-container">
      <div class="newsletter-panel glass" data-reveal>
        <div class="newsletter-panel__copy">
          <h2 class="newsletter-panel__title" id="cms-newsletter-title">Stay in the Loop</h2>
          <p class="newsletter-panel__subtitle" id="cms-newsletter-subtitle"></p>
          <p class="newsletter-panel__privacy" id="cms-newsletter-privacy"></p>
        </div>
        <form id="newsletter-form" class="newsletter-form" novalidate>
          <div class="newsletter-form__row">
            <input type="email" id="newsletter-email" name="email" autocomplete="email"
              placeholder="Enter your email" aria-label="Email for newsletter" required />
            <button type="submit" class="btn-primary newsletter-form__submit" id="newsletter-submit-btn">
              <i class="fas fa-bell" aria-hidden="true"></i>
              <span id="cms-newsletter-btn-label">Subscribe</span>
            </button>
          </div>
          <div class="newsletter-form__error" id="newsletter-form-error" role="alert"></div>
          <div class="newsletter-form__success" id="newsletter-form-success" role="status"></div>
        </form>
      </div>
    </div>
  </section>
