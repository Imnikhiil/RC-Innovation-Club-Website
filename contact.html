  <script>
    (function () {
      var tk = 'rc_theme_preference';
      var ck = 'rc_color_preference';
      var colors = ['ocean', 'sunset', 'emerald', 'royal', 'coral'];
      var t = null, c = null;
      try { t = localStorage.getItem(tk); c = localStorage.getItem(ck); } catch (e) {}
      if (t !== 'dark' && t !== 'light') {
        t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      }
      if (colors.indexOf(c) === -1) c = 'ocean';
      document.documentElement.setAttribute('data-theme', t);
      document.documentElement.setAttribute('data-color', c);
    })();
  </script>

<!-- CONTACT -->
  <section id="contact" class="section-block section-alt">
    <div class="site-container">
      <header class="ui-section-head max-w-2xl mx-auto">
        <span class="section-eyebrow" id="cms-contact-eyebrow" data-reveal>Get in Touch</span>
        <h2 class="section-title mb-3" id="cms-contact-title" data-reveal>Contact Us</h2>
        <p class="section-subtitle" id="cms-contact-subtitle" data-reveal data-reveal-delay="100"></p>
      </header>

      <div class="contact-layout">
        <div class="contact-info glass card-hover" data-reveal>
          <h3 class="contact-info__title">Reach RC Innovation Club</h3>
          <p class="contact-info__text">We welcome questions from students, faculty, sponsors, and partner organizations.</p>
          <ul class="contact-info__list">
            <li>
              <i class="fas fa-envelope" aria-hidden="true"></i>
              <a href="#" id="cms-contact-email">rcinnovationclub@gmail.com</a>
            </li>
            <li>
              <i class="fab fa-instagram" aria-hidden="true"></i>
              <a href="#" id="cms-contact-instagram" target="_blank" rel="noopener">Instagram</a>
            </li>
            <li>
              <i class="fab fa-whatsapp" aria-hidden="true"></i>
              <a href="#" id="cms-contact-whatsapp" target="_blank" rel="noopener">WhatsApp Channel</a>
            </li>
            <li>
              <i class="fas fa-location-dot" aria-hidden="true"></i>
              <span>DSEU Rajokri Campus, New Delhi</span>
            </li>
          </ul>
        </div>

        <div class="contact-form-panel glass" data-reveal>
          <form id="contact-form" class="contact-form" novalidate>
            <div class="contact-form__grid">
              <div class="contact-field">
                <label for="contact-name" id="cms-contact-name-label">Full Name <span class="required">*</span></label>
                <input type="text" id="contact-name" name="name" required autocomplete="name" placeholder="Your name" />
              </div>
              <div class="contact-field">
                <label for="contact-email" id="cms-contact-email-label">Email <span class="required">*</span></label>
                <input type="email" id="contact-email" name="email" required autocomplete="email" placeholder="you@example.com" />
              </div>
            </div>
            <div class="contact-field">
              <label for="contact-subject" id="cms-contact-subject-label">Subject <span class="required">*</span></label>
              <select id="contact-subject" name="subject" required>
                <option value="">Select a subject</option>
              </select>
            </div>
            <div class="contact-field">
              <label for="contact-message" id="cms-contact-message-label">Message <span class="required">*</span></label>
              <textarea id="contact-message" name="message" rows="5" required placeholder="How can we help you?"></textarea>
            </div>
            <div class="contact-form__error" id="contact-form-error" role="alert"></div>
            <div class="contact-form__success" id="contact-form-success" role="status"></div>
            <button type="submit" class="btn-primary contact-form__submit" id="contact-submit-btn">
              <i class="fas fa-paper-plane" aria-hidden="true"></i> <span id="cms-contact-submit-label">Send Message</span>
            </button>
          </form>
        </div>
      </div>
    </div>
  </section>
<!-- NEWSLETTER -->
  <section id="newsletter" class="newsletter-section section-block" hidden>
    <div class="site-container">
      <div class="newsletter-panel glass" data-reveal>
        <div class="newsletter-panel__copy">
          <h2 class="newsletter-panel__title" id="cms-newsletter-title">Stay in the Loop</h2>
          <p class="newsletter-panel__subtitle" id="cms-newsletter-subtitle"></p>
          <p class="newsletter-panel__privacy" id="cms-newsletter-privacy"></p>
        </div>
        <form id="newsletter-form" class="newsletter-form" novalidate>
          <div class="newsletter-form__row">
            <input type="email" id="newsletter-email" name="email" autocomplete="email"
              placeholder="Enter your email" aria-label="Email for newsletter" required />
            <button type="submit" class="btn-primary newsletter-form__submit" id="newsletter-submit-btn">
              <i class="fas fa-bell" aria-hidden="true"></i>
              <span id="cms-newsletter-btn-label">Subscribe</span>
            </button>
          </div>
          <div class="newsletter-form__error" id="newsletter-form-error" role="alert"></div>
          <div class="newsletter-form__success" id="newsletter-form-success" role="status"></div>
        </form>
      </div>
    </div>
  </section>
