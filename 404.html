<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | RC Innovation Club</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/theme.css" />
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
    .err-wrap { max-width: 28rem; }
    .err-code { font-size: 4rem; font-weight: 800; color: #38bdf8; line-height: 1; }
    .err-title { font-size: 1.5rem; margin: 1rem 0 0.5rem; }
    .err-text { color: #94a3b8; margin-bottom: 1.5rem; line-height: 1.6; }
    .err-links { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    .err-links a { padding: 0.65rem 1.25rem; border-radius: 0.75rem; text-decoration: none; font-weight: 600; }
    .err-links a.primary { background: #0284c7; color: #fff; }
    .err-links a.secondary { border: 1px solid rgba(255,255,255,0.15); color: #e2e8f0; }
  </style>
</head>
<body class="bg-gradient-pro">
  <div class="err-wrap">
    <div class="err-code">404</div>
    <h1 class="err-title">Page not found</h1>
    <p class="err-text">The page you are looking for does not exist or may have been moved.</p>
    <div class="err-links">
      <a href="/" class="primary">Back to Home</a>
      <a href="/gallery.html" class="secondary">Gallery</a>
    </div>
  </div>
</body>
</html>
