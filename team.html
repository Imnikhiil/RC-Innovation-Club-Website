  <script>
    (function () {
      var tk = 'rc_theme_preference';
      var ck = 'rc_color_preference';
      var colors = ['ocean', 'sunset', 'emerald', 'royal', 'coral'];
      var t = null, c = null;
      try { t = localStorage.getItem(tk); c = localStorage.getItem(ck); } catch (e) {}
      try {
        if (!localStorage.getItem('rc_theme_brand_v1')) {
          localStorage.setItem('rc_theme_brand_v1', '1');
          localStorage.setItem(tk, 'dark');
          localStorage.setItem(ck, 'ocean');
          t = 'dark';
          c = 'ocean';
        }
      } catch (e) {}
      if (t !== 'dark' && t !== 'light') t = 'dark';
      if (colors.indexOf(c) === -1) c = 'ocean';
      document.documentElement.setAttribute('data-theme', t);
      document.documentElement.setAttribute('data-color', c);
    })();
  </script>

<!-- TEAM HIERARCHY FILTER -->

      <p class="team-hierarchy-hint" id="cms-team-hierarchy-hint">Filter by leadership level, department, ambassadors, members, or alumni.</p>

    </div>
  </div>
<!-- CORE TEAM -->
  <section id="core" class="section-block core-section">
    <div class="site-container ui-section-head">
      <span class="section-eyebrow" id="cms-core-eyebrow" data-reveal>Leadership</span>
      <h2 class="section-title mb-3" id="cms-core-title" data-reveal>Core Team</h2>
      <p class="section-subtitle" id="cms-core-subtitle" data-reveal data-reveal-delay="100"></p>
    </div>

    <div class="site-container team-grid" id="team-grid" aria-label="Core team members"></div>
  </section>
<!-- AMBASSADORS -->
  <section id="ambassadors" class="section-block section-alt">
    <div class="site-container ui-section-head">
      <span class="section-eyebrow" id="cms-ambassadors-eyebrow" data-reveal>Representation</span>
      <h2 class="section-title mb-3" id="cms-ambassadors-title" data-reveal>Ambassadors</h2>
      <p class="section-subtitle" id="cms-ambassadors-subtitle" data-reveal data-reveal-delay="100"></p>
    </div>

    <div class="site-container ambassador-grid" id="cms-ambassadors-grid"></div>
  </section>
<!-- MEMBERS -->
  <section id="members" class="section-block members-section">
    <div class="members-section__glow" aria-hidden="true"></div>
    <div class="site-container ui-section-head">
      <span class="section-eyebrow" id="cms-members-eyebrow" data-reveal>Community</span>
      <h2 class="section-title mb-3" id="cms-members-title" data-reveal>Members</h2>
      <p class="section-subtitle" id="cms-members-subtitle" data-reveal data-reveal-delay="100"></p>
    </div>

    <div class="site-container members-grid">
      <article class="members-panel members-panel--current" data-reveal>
        <header class="members-panel__header">
          <div class="members-panel__icon members-panel__icon--sky" aria-hidden="true">
            <i class="fas fa-user-group"></i>
          </div>
          <div class="members-panel__titles">
            <h3 class="members-panel__title" id="cms-members-current-title"></h3>
            <p class="members-panel__meta" id="cms-members-current-meta"></p>
          </div>
        </header>
        <div class="members-mosaic" id="cms-members-current" aria-label="Current members"></div>
      </article>

      <article class="members-panel members-panel--alumni" data-reveal data-reveal-delay="120">
        <header class="members-panel__header">
          <div class="members-panel__icon members-panel__icon--violet" aria-hidden="true">
            <i class="fas fa-award"></i>
          </div>
          <div class="members-panel__titles">
            <h3 class="members-panel__title" id="cms-members-previous-title"></h3>
            <p class="members-panel__meta" id="cms-members-previous-meta"></p>
          </div>
        </header>
        <div class="members-alumni" id="cms-members-previous" aria-label="Previous members"></div>
      </article>
    </div>
  </section>
<!-- NEWSLETTER -->
  <section id="newsletter" class="newsletter-section section-block" hidden>
    <div class="site-container">
      <div class="newsletter-panel glass" data-reveal>
        <div class="newsletter-panel__copy">
          <h2 class="newsletter-panel__title" id="cms-newsletter-title">Stay in the Loop</h2>
          <p class="newsletter-panel__subtitle" id="cms-newsletter-subtitle"></p>
          <p class="newsletter-panel__privacy" id="cms-newsletter-privacy"></p>
        </div>
        <form id="newsletter-form" class="newsletter-form" novalidate>
          <div class="newsletter-form__row">
            <input type="email" id="newsletter-email" name="email" autocomplete="email"
              placeholder="Enter your email" aria-label="Email for newsletter" required />
            <button type="submit" class="btn-primary newsletter-form__submit" id="newsletter-submit-btn">
              <i class="fas fa-bell" aria-hidden="true"></i>
              <span id="cms-newsletter-btn-label">Subscribe</span>
            </button>
          </div>
          <div class="newsletter-form__error" id="newsletter-form-error" role="alert"></div>
          <div class="newsletter-form__success" id="newsletter-form-success" role="status"></div>
        </form>
      </div>
    </div>
  </section>
