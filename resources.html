  <script>
    (function () {
      var tk = 'rc_theme_preference';
      var ck = 'rc_color_preference';
      var colors = ['ocean', 'sunset', 'emerald', 'royal', 'coral'];
      var t = null, c = null;
      try { t = localStorage.getItem(tk); c = localStorage.getItem(ck); } catch (e) {}
      try {
        if (!localStorage.getItem('rc_theme_brand_v1')) {
          localStorage.setItem('rc_theme_brand_v1', '1');
          localStorage.setItem(tk, 'dark');
          localStorage.setItem(ck, 'ocean');
          t = 'dark';
          c = 'ocean';
        }
      } catch (e) {}
      if (t !== 'dark' && t !== 'light') t = 'dark';
      if (colors.indexOf(c) === -1) c = 'ocean';
      document.documentElement.setAttribute('data-theme', t);
      document.documentElement.setAttribute('data-color', c);
    })();
  </script>

<!-- RESOURCES -->
  <section id="resources" class="section-block">
    <div class="site-container ui-section-head">
      <span class="section-eyebrow" id="cms-resources-eyebrow" data-reveal>Learn & Grow</span>
      <h2 class="section-title mb-3" id="cms-resources-title" data-reveal>Resource Hub</h2>
      <p class="section-subtitle" id="cms-resources-subtitle" data-reveal data-reveal-delay="100"></p>
    </div>
    <div class="site-container">
      <div class="resources-controls" data-reveal data-reveal-delay="80">
        <div class="resources-search-wrap">
          <i class="fas fa-search" aria-hidden="true"></i>
          <input type="search" id="resources-search" placeholder="Search resources…" aria-label="Search resources" />
        </div>
        <div class="resources-filters" id="resources-filters"></div>
      </div>
      <div class="resources-grid" id="cms-resources-grid" data-reveal data-reveal-delay="120"></div>
      <p class="resources-empty" id="resources-empty" hidden>No resources match your search.</p>
    </div>
  </section>
<!-- CERTIFICATES -->
  <section id="certificates" class="section-block section-alt">
    <div class="site-container ui-section-head max-w-2xl mx-auto">
      <span class="section-eyebrow" id="cms-cert-eyebrow" data-reveal>Recognition</span>
      <h2 class="section-title mb-3" id="cms-cert-title" data-reveal>Certificate Verification</h2>
      <p class="section-subtitle" id="cms-cert-subtitle" data-reveal data-reveal-delay="100"></p>
    </div>
    <div class="site-container max-w-2xl mx-auto">
      <div class="cert-verify-panel glass" data-reveal data-reveal-delay="120">
        <form id="cert-verify-form" class="cert-verify-form" novalidate>
          <label for="cert-verify-input" class="cert-verify-form__label" id="cms-cert-verify-label">Enter Certificate ID</label>
          <div class="cert-verify-form__row">
            <input type="text" id="cert-verify-input" name="certId" autocomplete="off"
              placeholder="e.g. RCIC-2026-DEMO01" aria-describedby="cms-cert-verify-hint" />
            <button type="submit" class="btn-primary cert-verify-form__submit" id="cms-cert-verify-btn">
              <i class="fas fa-shield-halved" aria-hidden="true"></i> Verify Certificate
            </button>
          </div>
          <p class="cert-verify-form__hint" id="cms-cert-verify-hint">Enter the ID printed on your certificate or membership card.</p>
        </form>
        <div id="cert-verify-result" class="cert-verify-result-wrap" hidden></div>
      </div>
    </div>
  </section>
<!-- NEWSLETTER -->
  <section id="newsletter" class="newsletter-section section-block" hidden>
    <div class="site-container">
      <div class="newsletter-panel glass" data-reveal>
        <div class="newsletter-panel__copy">
          <h2 class="newsletter-panel__title" id="cms-newsletter-title">Stay in the Loop</h2>
          <p class="newsletter-panel__subtitle" id="cms-newsletter-subtitle"></p>
          <p class="newsletter-panel__privacy" id="cms-newsletter-privacy"></p>
        </div>
        <form id="newsletter-form" class="newsletter-form" novalidate>
          <div class="newsletter-form__row">
            <input type="email" id="newsletter-email" name="email" autocomplete="email"
              placeholder="Enter your email" aria-label="Email for newsletter" required />
            <button type="submit" class="btn-primary newsletter-form__submit" id="newsletter-submit-btn">
              <i class="fas fa-bell" aria-hidden="true"></i>
              <span id="cms-newsletter-btn-label">Subscribe</span>
            </button>
          </div>
          <div class="newsletter-form__error" id="newsletter-form-error" role="alert"></div>
          <div class="newsletter-form__success" id="newsletter-form-success" role="status"></div>
        </form>
      </div>
    </div>
  </section>
